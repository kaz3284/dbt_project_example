version: 2

models:
  - name: dim_customers
    description: "顧客ディメンション。国名・地域名を付与済み"
    columns:
      - name: customer_key
        description: "顧客キー（主キー）"
        data_tests:
          - unique
          - not_null

  - name: fct_orders
    description: "注文ファクト。注文粒度で売上・地域を保持"
    columns:
      - name: order_key
        description: "注文キー（主キー）"
        data_tests:
          - unique
          - not_null
      - name: net_sales_amount
        description: "純売上合計"
        data_tests:
          - not_null

  - name: mart_sales_by_region
    description: "地域×年月の売上サマリ。fct_orders を地域・年月で集約した最終データマート"
    columns:
      - name: region_name
        description: "地域名"
        data_tests:
          - not_null
      - name: order_month
        description: "注文年月（月初日）"
        data_tests:
          - not_null
      - name: net_sales_amount
        description: "純売上合計 = Σ(extended_price × (1 - discount))"
        data_tests:
          - not_null
