version: 2

models:
  - name: mart_sales_by_region
    description: "地域×年月の売上サマリ。fct_orders を地域・年月で集約した最終データマート"
    columns:
      - name: region_name
        description: "地域名"
        data_tests:
          - not_null
      - name: order_month
        description: "注文年月（月初日）"
        data_tests:
          - not_null
      - name: order_count
        description: "注文件数"
      - name: customer_count
        description: "ユニーク顧客数"
      - name: total_quantity
        description: "数量合計"
      - name: net_sales_amount
        description: "純売上合計 = Σ(extended_price × (1 - discount))"
        data_tests:
          - not_null
      - name: avg_order_value
        description: "平均注文単価 = net_sales_amount ÷ order_count"
