version: 2

models:
  - name: stg_tpch__customers
    description: "顧客マスタのクレンジング済みビュー"
    columns:
      - name: customer_key
        description: "顧客キー（主キー）"
        data_tests:
          - unique
          - not_null

  - name: stg_tpch__orders
    description: "注文のクレンジング済みビュー"
    columns:
      - name: order_key
        description: "注文キー（主キー）"
        data_tests:
          - unique
          - not_null
      - name: customer_key
        description: "顧客キー"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_tpch__customers')
                field: customer_key

  - name: stg_tpch__lineitems
    description: "注文明細のクレンジング済みビュー。net_amount を計算済み"
    columns:
      - name: order_key
        description: "注文キー"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_tpch__orders')
                field: order_key

  - name: stg_tpch__nations
    description: "国マスタ"
    columns:
      - name: nation_key
        description: "国キー（主キー）"
        data_tests:
          - unique
          - not_null

  - name: stg_tpch__regions
    description: "地域マスタ"
    columns:
      - name: region_key
        description: "地域キー（主キー）"
        data_tests:
          - unique
          - not_null
