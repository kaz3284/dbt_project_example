version: 2

models:
  - name: stg_tpch__orders
    description: "注文のクレンジング済みビュー"
    columns:
      - name: order_key
        description: "注文キー（主キー）"
        data_tests:
          - unique
          - not_null
      - name: customer_key
        description: "顧客キー"
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_tpch__customers')
                field: customer_key
      - name: order_status
        description: "注文ステータス（F: 完了, O: 未完了, P: 一部完了）"
      - name: total_price
        description: "注文合計金額（税・割引込み）"
      - name: order_date
        description: "注文日"
      - name: order_month
        description: "注文年月（order_date を月初日に切り捨てた値）"
      - name: order_priority
        description: "注文優先度（例: 1-URGENT, 2-HIGH など）"
